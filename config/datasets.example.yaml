# Example dataset configuration template
# Copy this file to config/datasets.yaml and set real paths.

experiments:
  evaluation_ks: [1, 5, 10, 20, 50]
  tfidf_grid:
    - ngram_range: [1, 1]
      min_df: 1
      max_df: 1.0
      sublinear_tf: false
    - ngram_range: [1, 2]
      min_df: 1
      max_df: 1.0
      sublinear_tf: true
  bm25_grid:
    - k1: 1.5
      b: 0.75
    - k1: 1.2
      b: 0.75

datasets:
  conference_v1:
    track: conference
    version: "1"
    source_rdf: /Users/.../source.rdf
    target_rdf: /Users/.../target.rdf
    alignment_rdf: /Users/.../alignment.rdf
